rmcs_relocation:
  ros__parameters:
    # 调参总原则：
    #   - 看到 "GICP coarse failed"：先放宽 max_correspondence_distance_m / 增加 coarse_iterations / 增大 submap_radius_m。
    #   - 看到 "registration rejected: score,inlier"：GICP 已经收敛，但验收质量不够；先确认是否假匹配，再动 score/inlier。
    #   - 看到 "out_of_bounds / yaw / distance"：通常是镜像或错误 seed，不要盲目放宽验收。
    #   - local/wide 的 SC seed 位置是描述子网格中心，不是最终估计位姿；看 accepted 日志里的 estimated。
    #   - 注释里的 score/inlier 范围是本机本地图测试经验，实车上只作为参考。

    # map / frame / service ---------------------------------------------------
    map_path: "/workspaces/RMCS/rmcs_ws/src/rmcs-navigation-deps/rmcs_relocation/maps/1.pcd"
    descriptor_path: "/workspaces/RMCS/rmcs_ws/src/rmcs-navigation-deps/rmcs_relocation/maps/1.sc_desc"
    world_frame: "world"
    odom_frame: "odom"
    base_frame: "base_link"
    service_name: "/rmcs_relocation/relocalize"
    publish_tf_rate_hz: 10.0

    # scan_context.* ----------------------------------------------------------
    # SC 描述子库配置必须和 maps/*.sc_desc 生成时一致。
    # sectors=60 表示 yaw 量化约 6deg，所以 local/wide SC 主路径一般按 6deg 步长补偿。
    scan_context:
        num_rings: 20
        num_sectors: 60
        max_radius_m: 20.0

    # diagnostics.* -----------------------------------------------------------
    # 打开后会打印 coarse/precise 阶段的 tried/converged/score/inlier。
    diagnostics:
        log_failure_details: true
    
    # 如果实车 initial 又偶发 coarse failed：
    #   1. 先把 max_correspondence_distance_m 从 3.0 加到 4.0。
    #   2. 再考虑 collect_duration_sec 加到 2.5 或 min_accumulated_points 加到 2500。
    #   3. 最后才考虑 coarse_iterations 增加；不要先放宽 initial_max_* 验收。
    initial:
        # [initial-1] 点云采集
        pointcloud_topic: "/cloud_registered_undistort"
        collect_duration_sec: 2.0
        min_accumulated_points: 2500

        # [initial-2] 点云预处理

        voxel_leaf_m: 0.2
        outlier_mean_k: 30
        outlier_stddev_mul_thresh: 0.8

        # [initial-3] 子图与 GICP 收敛裕量
        submap_radius_m: 5.0
        coarse_iterations: 50
        precise_iterations: 100
        max_correspondence_distance_m: 4.0
        score_threshold: 0.5

        # [initial-4] yaw 搜索
        # step=10 会生成 0,+10,-10,+20,-20,+30,-30 共 9 个 coarse 候选。
        yaw_search_window_deg: 180.0
        coarse_yaw_step_deg: 15.0
        coarse_top_k: 1

        # [initial-5] 最终验收
        # initial 不看 inlier 验收，只看 score / 距离 / yaw / field_bounds。
        initial_max_translation_error_m: 0.5
        initial_max_yaw_error_deg: 30.0
        field_bounds:
          min_x: -2.0
          max_x: 7.0
          min_y: -3.5
          max_y: 3.5
          min_z: -1.0
          max_z: 2.0

    # local 会先查 SC top-K，通常 SC[0] 就是当前位置附近，然后以该 seed 跑 GICP。
    # 如果 local 又出现 coarse failed：
    #   1. 先确认 seed setup 里的 yaw/step/max_corr 是否仍是 12/6/4.0。
    #   2. 偶发失败可以接受；连续失败先把 coarse_iterations 加到 18。
    #   3. 如果点云明显少，再加 collect_duration_sec，但会增加运动畸变。
    #   4. 不建议先打开 map consistency，它会增加动态场景下的不确定性。
    local:
        # [local-1] 点云采集
        pointcloud_topic: "/cloud_registered_undistort"
        collect_duration_sec: 0.4
        min_accumulated_points: 700

        # [local-2] 子图与 GICP
        # max_corr=4.0 是 local 成功率的核心；之前收得太紧会导致 coarse 不收敛。
        # precise_iterations=8 已够用，继续加只会变慢，精度收益不明显。
        submap_radius_m: 5.0
        coarse_iterations: 15
        precise_iterations: 8
        max_correspondence_distance_m: 4.0
        coarse_score_threshold: 0.5

        # [local-3] yaw 搜索
        # SC sectors=60，yaw 量化约 6deg。窗口 ±12deg + step 6deg 会试 0,±6,±12。
        # 这个窗口是 local 稳定性的核心之一；太小会大角度失败，太大会变慢并增加误收敛。
        yaw_window_deg: 12.0
        coarse_yaw_step_deg: 6.0

        # [local-4] map consistency filter
        # local 目前关闭。只有动态障碍物极多且误匹配明显时再考虑打开。
        enable_map_consistency_filter: false
        map_consistency_distance_m: 2.0
        min_retained_fraction: 0.15

        # [local-5] SC seed 数
        # local 目标是快；top1 正确率足够高，失败时直接下一轮重试即可。
        sc_top_k: 1

        # [local-6] 验收
        # local 允许精度没那么高，但必须拦住跨半场/镜像错配。
        # min_inlier_ratio=0.08 很宽，主要靠 distance/yaw/field_bounds 限制错误结果。
        score_threshold: 0.50
        min_inlier_ratio: 0.08
        max_distance_from_prior_m: 6.0
        max_yaw_from_prior_deg: 120.0
        field_bounds:
          min_x: -2.0
          max_x: 7.0
          min_y: -3.5
          max_y: 3.5
          min_z: -1.0
          max_z: 2.0

    # -------------------------------------------------------------------------
    # wide.* — MODE_WIDE=2
    # -------------------------------------------------------------------------
    # 用途：兜底重定位。调用 wide 前机器人会停下，因此不优先考虑运动补偿；
    # 该模式失败一次很致命，所以优先级是：正确性 > 成功率 > 速度。
    #
    # wide 两条路径：
    #   1. scan_context 主路径：取 SC top-K seed，逐个 GICP，验收通过立即返回。
    #   2. fallback 路径：SC 失败/不可用时，以 prior/center 周围 5 个位置 × yaw_count 个朝向兜底。
    #
    # 本轮测试结论：
    #   - SC[0] 通常就是正确候选；SC[1+] 多数是镜像/相似结构，top_k 加到 6 收益很低。
    #   - sc_top_k=3 足够：保留少量冗余，又避免大量错误 seed 拖慢 fallback。
    #   - 可疑假解样例：score≈0.497, inlier≈0.225, dist≈0.63m；因此 wide inlier 阈值定为 0.25。
    #   - fallback 原先 yaw_count=4 只试 0/90/180/-90，真实 yaw 在 -18deg 时中心位置也会失败。
    #   - 代码已改为 fallback yaw 围绕当前 odom yaw 对称展开，fallback_yaw_count=8 提供 45deg 间隔兜底。
    #
    # 如果 wide 误拒正确结果：
    #   - 先把 min_inlier_ratio 从 0.25 降到 0.20。
    # 如果 wide 误接错误结果：
    #   - 先把 min_inlier_ratio 提到 0.30，或把 score_threshold 收到 0.45。
    # 如果 SC top0 偶发 coarse failed 但 fallback 能救：
    #   - 保持现状，不要继续加 sc_top_k。
    # 如果 fallback 仍 coarse failed：
    #   - 优先把 fallback_yaw_count 加到 12，或把 max_correspondence_distance_m 加到 4.5。
    wide:
        # [wide-1] 点云采集
        # wide 会停车调用，采 1.5s 换稳定性；本地约 4200~5000 点。
        pointcloud_topic: "/cloud_registered_undistort"
        collect_duration_sec: 1.5
        min_accumulated_points: 2000

        # [wide-2] 子图与 GICP
        # wide 主路径多数 SC[0] 一次成功，正常耗时约 1~1.5s。
        # max_corr=4.0 保证 SC seed 有少量位置/yaw 偏差时仍能收敛。
        submap_radius_m: 5.0
        coarse_iterations: 15
        precise_iterations: 15
        max_correspondence_distance_m: 4.0
        coarse_score_threshold: 0.5

        # [wide-3] yaw 搜索
        # 这组 YAML yaw 参数主要给 fallback 用；SC 主路径在代码里强制使用 ±12deg / 6deg step。
        # fallback 每个 seed 的 coarse_step=15 大于 yaw_window=12，所以每个 seed 基本只试自身 yaw。
        # 因此 fallback_yaw_count 比 yaw_window 更关键。
        yaw_window_deg: 12.0
        coarse_yaw_step_deg: 15.0

        # [wide-4] SC 主路径 seed
        # 实测 top6 后几个大多是镜像候选，top3 是当前折中。
        # max_candidate_count 是单个 seed 内保留的 GICP coarse 候选数，保持 1 以早停提速。
        sc_top_k: 3
        max_candidate_count: 1
        rank_weight_inlier: 0.5
        rank_weight_distance: 0.3

        # [wide-5] fallback seed
        # 位置：center + 前后左右 3.5m，共 5 个位置。
        # yaw：代码会以当前 odom yaw 为中心对称展开，而不是固定从世界 0deg 开始。
        # yaw_count=8 等价于 45deg 间隔，能覆盖大角度停车转向后的兜底场景。
        fallback_position_radius_m: 3.5
        fallback_yaw_count: 8

        # [wide-6] map consistency filter
        # wide 停车采集，动态畸变少，打开 filter 能减少人/临时物体干扰。
        # retained fraction 正常约 0.6~0.75；低于 min_retained_fraction 会自动回退到原始点云。
        enable_map_consistency_filter: true
        map_consistency_distance_m: 2.0
        min_retained_fraction: 0.15

        # [wide-7] 验收
        # wide 是兜底，不能接受低质量镜像解。当前定版要求 score<=0.50 且 inlier>=0.25。
        # 本地正确解常见 score 0.39~0.44, inlier 0.56~0.58；大角度/边缘场景会低一些。
        score_threshold: 0.50
        min_inlier_ratio: 0.25
        max_distance_from_prior_m: 12.0
        max_yaw_from_prior_deg: 120.0
        field_bounds:
          min_x: -2.0
          max_x: 7.0
          min_y: -3.5
          max_y: 3.5
          min_z: -1.0
          max_z: 2.0
