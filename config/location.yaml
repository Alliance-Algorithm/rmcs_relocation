rmcs_relocation:
  ros__parameters:
    map_path: "/tmp/point-lio/1.pcd"
    descriptor_path: ""               # 留空则不加载，wide 走 fallback (Phase 5 后启用)
    world_frame: "world"
    odom_frame: "odom"
    base_frame: "base_link"
    service_name: "/rmcs_relocation/relocalize"
    publish_tf_rate_hz: 10.0

    # scan_context.* — 全局 SC 描述子库（Phase 5 起在 wide 中使用）
    scan_context:
        num_rings: 20
        num_sectors: 60
        max_radius_m: 20.0

    # diagnostics.* — 调试日志开关（默认全关）
    diagnostics:
        log_failure_details: false   # 开启后每次失败 dispatcher 多打一行带 prior/score/conf/msg 的 warn

    # initial.* — 初始重定位 (MODE_INITIAL=0)
    initial:
        # [1-1] 点云采集
        pointcloud_topic: "/cloud_registered_undistort"
        collect_duration_sec: 2.0
        min_accumulated_points: 2000

        # [1-2] 配准质量
        submap_radius_m: 4.0
        coarse_iterations: 12
        refine_iterations: 8
        precise_iterations: 30
        max_correspondence_distance_m: 1.8
        score_threshold: 0.5

        # [1-3] yaw 搜索窗口
        yaw_search_window_deg: 30.0
        coarse_yaw_step_deg: 10.0
        refine_yaw_step_deg: 10.0
        coarse_top_k: 1

        # [1-4] 点云预处理
        voxel_leaf_m: 0.2
        outlier_mean_k: 30
        outlier_stddev_mul_thresh: 0.8

        # [1-5] 验收阈值
        initial_max_translation_error_m: 0.5
        initial_max_yaw_error_deg: 30.0
        field_bounds:
          min_x: -2.0
          max_x: 7.0
          min_y: -5.5
          max_y: 5.5
          min_z: -2.0
          max_z: 2.0


    # local.* — 局部纠正 (MODE_LOCAL=1)，单 seed @ prior，热路径
    local:
        # [2-1] 点云采集
        pointcloud_topic: "/cloud_registered_undistort"
        collect_duration_sec: 0.8
        min_accumulated_points: 1000

        # [2-2] 配准质量
        submap_radius_m: 5.0
        coarse_iterations: 12
        refine_iterations: 6
        precise_iterations: 12
        max_correspondence_distance_m: 4.0
        coarse_score_threshold: 0.5    # 仅 coarse early-break 用

        # [2-3] yaw 搜索窗口
        yaw_window_deg: 30.0
        coarse_yaw_step_deg: 15.0
        refine_yaw_step_deg: 12.0

        # [2-4] map consistency filter（默认关）
        enable_map_consistency_filter: false
        map_consistency_distance_m: 0.8
        min_retained_fraction: 0.15

        # [2-5] 验收阈值
        score_threshold: 0.50
        min_inlier_ratio: 0.10
        max_distance_from_prior_m: 5.0
        max_yaw_from_prior_deg: 60.0
        field_bounds:
          min_x: -2.0
          max_x: 7.0
          min_y: -5.5
          max_y: 5.5
          min_z: -2.0
          max_z: 2.0


    # wide.* — 全局兜底 (MODE_WIDE=2)，多 seed；Phase 5 将由 ScanContext 取代 seed 生成
    wide:
        # [3-1] 点云采集
        pointcloud_topic: "/cloud_registered_undistort"
        collect_duration_sec: 1.5
        min_accumulated_points: 2000

        # [3-2] 配准质量
        submap_radius_m: 6.0
        coarse_iterations: 15
        refine_iterations: 10
        precise_iterations: 25
        max_correspondence_distance_m: 4.0
        coarse_score_threshold: 0.35

        # [3-3] yaw 搜索窗口
        yaw_window_deg: 60.0
        coarse_yaw_step_deg: 18.0
        refine_yaw_step_deg: 12.0

        # [3-4] SC 主路径：从描述子库取前 sc_top_k 个候选作为 seed
        sc_top_k: 5
        # SC 不可用时的 fallback 位置偏移半径（5 位置 × 8 yaw = 40 seed 笛卡尔积）
        seed_offset_m: 1.5
        max_candidate_count: 1
        rank_weight_inlier: 0.5
        rank_weight_distance: 0.3

        # [3-5] map consistency filter（默认关）
        enable_map_consistency_filter: false
        map_consistency_distance_m: 0.8
        min_retained_fraction: 0.15

        # [3-6] 验收阈值
        score_threshold: 0.35
        min_inlier_ratio: 0.08
        max_distance_from_prior_m: 12.0
        max_yaw_from_prior_deg: 120.0
        field_bounds:
          min_x: -2.0
          max_x: 7.0
          min_y: -5.5
          max_y: 5.5
          min_z: -2.0
          max_z: 2.0
