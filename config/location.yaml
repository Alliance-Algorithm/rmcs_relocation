rmcs_relocation:
  ros__parameters:
    # map / frame / service ---------------------------------------------------
    # 全局 PCD 地图路径，启动时读取后作为所有 GICP 匹配的 target 点云。
    # map_path: "/rmcs_install/share/rmcs_relocation/maps/my.pcd"
    map_path: "/workspaces/RMCS/rmcs_ws/src/rmcs-navigation-deps/rmcs_relocation/maps/my.pcd"
    # Scan Context 描述子库路径，local/wide 用它查候选 seed；配置必须和当前地图匹配。
    # descriptor_path: "/rmcs_install/share/rmcs_relocation/maps/my.sc_desc"
    descriptor_path: "/workspaces/RMCS/rmcs_ws/src/rmcs-navigation-deps/rmcs_relocation/maps/my.sc_desc"
    world_frame: "world"
    odom_frame: "odom"
    base_frame: "base_link"
    service_name: "/rmcs_relocation/relocalize"
    # 三种模式共用的输入点云话题，通常是 LIO 去畸变后的 odom 系点云。
    pointcloud_topic: "/cloud_registered_undistort"
    publish_tf_rate_hz: 10.0

    # field_bounds.* ---------------------------------------------------------
    # INITIAL / LOCAL / WIDE 共用的最终位姿场地边界，越界结果会被 validator 拒绝。
    field_bounds:
        min_x: -1.0
        max_x: 9.0
        min_y: -2.0
        max_y: 8.0
        min_z: -1.0
        max_z: 3.0

    # scan_context.* ----------------------------------------------------------
    # SC 描述子库配置必须和 maps/*.sc_desc 生成时一致，任一字段不匹配会拒绝加载。
    scan_context:
        num_rings: 20
        num_sectors: 60
        max_radius_m: 20.0
        # 构建描述子时保留点的最低 z，高于地面可减少地面噪声。
        z_min_m: 0.05
        # 构建描述子时保留点的最高 z，低于天花板/残点可减少高处噪声。
        z_max_m: 3.0

    # diagnostics.* -----------------------------------------------------------
    diagnostics:
        # 是否打印 coarse/precise 阶段的 tried/converged/score/inlier 等失败诊断日志。
        log_failure_details: true

    # preprocess.* -----------------------------------------------------------
    preprocess:
        # query 和 map 点云 voxel 下采样叶子边长，单位 m；越大越快但细节越少。
        voxel_leaf_m: 0.15
        # 统计滤波每个点参考的近邻数量；越大越平滑但越可能误删局部结构。
        outlier_mean_k: 20
        # 统计滤波标准差倍数阈值；越小滤得越严格，动态点/孤立点更容易被删。
        outlier_stddev_mul_thresh: 0.8

    # gicp.* ----------------------------------------------------------------
    gicp:
        # small_gicp 使用的工作线程数，主要影响配准耗时。
        num_threads: 4
        # 为每个点估计协方差时使用的近邻数，影响 GICP 法向/协方差信息稳定性。
        num_neighbors_for_covariance: 20
        # GICP 旋转收敛阈值。
        rotation_epsilon: 0.002
        # small_gicp 内部 target/source 体素分辨率，影响配准速度和精度。
        voxel_resolution: 0.15
        # coarse 阶段变换更新收敛阈值，越小迭代越充分但更慢。
        coarse_transformation_epsilon: 0.001
        # precise 阶段变换更新收敛阈值，越小最终解更细但更慢。
        precise_transformation_epsilon: 0.0001

    # initial.* — MODE_INITIAL=0 ---------------------------------------------
    initial:
        collect_duration_sec: 2.0
        min_accumulated_points: 2500

        # initial coarse 阶段最大迭代次数，用于从 initial_guess 附近粗收敛。
        coarse_iterations: 200
        # initial precise 阶段最大迭代次数，用于在 coarse 结果附近精修。
        precise_iterations: 100
        # initial GICP 最大对应点距离，单位 m；越大收敛域越宽但误匹配更多。
        max_correspondence_distance_m: 4.0
        # initial 最终 score 验收阈值，越小越严格；该值同时传给 validator。
        score_threshold: 0.02

        # initial 以请求 initial_guess 为中心搜索 yaw 的半窗口，单位 deg。
        yaw_search_window_deg: 30.0
        # initial yaw 粗搜索步长，单位 deg；越小候选越多、耗时越长。
        coarse_yaw_step_deg: 1.0
        # initial 从粗配准候选里保留进入 precise 阶段的最佳候选数量。
        coarse_top_k: 5

        # initial 最终结果相对请求 initial_guess 的最大平移误差，单位 m。
        initial_max_translation_error_m: 0.5
        # initial 最终结果相对请求 initial_guess 的最大 yaw 误差，单位 deg。
        initial_max_yaw_error_deg: 30.0

    # local.* — MODE_LOCAL=1 --------------------------------------------------
    local:
        collect_duration_sec: 0.5
        min_accumulated_points: 800

        # local coarse 阶段最大迭代次数，用于从 SC/prior seed 附近粗收敛。
        coarse_iterations: 50
        # local precise 阶段最大迭代次数，用于在 coarse 结果附近精修。
        precise_iterations: 50
        # local GICP 最大对应点距离，单位 m；越大越能兜住 seed 偏差但更易误配。
        max_correspondence_distance_m: 4.0
        # local coarse 阶段允许进入 precise 的 score 上限，越小越早丢弃差候选。
        coarse_score_threshold: 0.1

        # local 在 SC seed yaw 周围额外搜索的半窗口，单位 deg。
        yaw_window_deg: 6.0
        # local yaw 粗搜索步长，单位 deg；通常与 SC sector 量化精度匹配。
        coarse_yaw_step_deg: 6.0

        # local 从 Scan Context 查询中最多尝试的 seed 数，前面的 seed 通过就早停。
        sc_top_k: 1

        # local 最终 score 验收阈值，越小越严格。
        score_threshold: 0.05
        # local 最终 inlier ratio 验收下限，越大越严格。
        min_inlier_ratio: 0.50
        # local 最终结果相对当前 prior 的最大平移距离，单位 m。
        max_distance_from_prior_m: 6.0
        # local 最终结果相对当前 prior 的最大 yaw 偏差，单位 deg。
        max_yaw_from_prior_deg: 150.0

        # ------- 导航安全门控（snapshot 参考时刻对齐配套） -------
        # 单次发布 world->odom 相对当前已发布值的最大平移增量，单位 m。
        # 与 max_distance_from_prior_m 不同：那是相对请求 prior，这是相对当前发布。
        # 必须显著小于 max_distance_from_prior_m，否则等于摆设。
        max_tf_correction_m: 0.30
        # 单次发布 world->odom 相对当前已发布值的最大 yaw 增量，单位 deg。
        max_tf_correction_yaw_deg: 5.0
        # 两次成功发布之间的最小间隔，单位 s。配合单次幅度形成累计修正速率上限。
        min_accept_interval_sec: 1.0
        # 按 reference_stamp 查 odom->base TF 的最大等待时长，单位 s。
        # 0 表示不等待；建议 0.03~0.1，覆盖话题/TF 之间的乱序。
        tf_lookup_timeout_sec: 0.0

    # wide.* — MODE_WIDE=2 ----------------------------------------------------
    wide:
        collect_duration_sec: 2.0
        min_accumulated_points: 3000

        # wide coarse 阶段最大迭代次数，用于从全局 SC seed 附近粗收敛。
        coarse_iterations: 200
        # wide precise 阶段最大迭代次数，用于在 coarse 结果附近精修。
        precise_iterations: 100
        # wide GICP 最大对应点距离，单位 m；越大越能兜住全局 seed 偏差但更慢。
        max_correspondence_distance_m: 4.0
        # wide coarse 阶段允许进入 precise 的 score 上限，越小越早丢弃差候选。
        coarse_score_threshold: 0.1

        # wide 在 SC seed yaw 周围额外搜索的半窗口，单位 deg。
        yaw_window_deg: 6.0
        # wide yaw 粗搜索步长，单位 deg；通常与 SC sector 量化精度匹配。
        coarse_yaw_step_deg: 6.0

        # wide 从 Scan Context 全局查询中最多尝试的 seed 数，前面的 seed 通过就早停。
        sc_top_k: 3
        # wide 单个 seed 内 coarse 后保留进入 precise/ranking 的候选数量。
        max_candidate_count: 2
        # wide 多候选排序时 inlier ratio 的权重；score 权重隐含为 1.0。
        rank_weight_inlier: 0.05

        # wide 最终 score 验收阈值，越小越严格。
        score_threshold: 0.02
        # wide 最终 inlier ratio 验收下限，越大越严格。
        min_inlier_ratio: 0.80
